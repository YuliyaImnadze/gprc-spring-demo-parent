syntax = "proto3";

option java_multiple_files = true;
option java_package = "demo.grpc.generated";
option java_outer_classname = "PriceProto";

service PriceService {
  rpc CalculatePrice (PriceRequest) returns (PriceResponse);
}

message PriceRequest {
  string product_name = 1;
  double unit_price = 2;
  int32 quantity = 3;
  double discount_percent = 4;
}

message PriceResponse {
  double total_without_discount = 1;
  double discount_amount = 2;
  double final_total = 3;
}